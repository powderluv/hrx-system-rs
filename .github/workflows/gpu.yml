# Self-hosted MI300 (gfx942) gates. Manual / on-demand: these need the prebuilt
# IREE archives ($HRX_BUILD_DIR), the TheRock venv ($THEROCK_VENV), the C
# libhrx.so.0, and a real GPU. Configure a runner labelled [self-hosted, mi300]
# with those env vars exported (HRX_BUILD_DIR, THEROCK_VENV, HRX_SYSTEM_SRC).
name: gpu
on:
  workflow_dispatch:

jobs:
  libhrx-gpu:
    runs-on: [self-hosted, mi300]
    steps:
      - uses: actions/checkout@v4

      - name: symbol parity (rust libhrx_rs.so vs C libhrx.so.0)
        run: bash scripts/check_symbol_parity.sh

      - name: ABI layout (Rust compile-time asserts + C header probe)
        run: |
          cargo build --release -p iree-sys   # fires crates/iree-sys/src/abi_layout.rs asserts
          bash scripts/check_abi_layout.sh

      - name: functional differential (7 suites, byte-identical vs C)
        run: HRX_RUN_GPU=1 bash scripts/libhrx_diff_test.sh

      - name: performance parity (rust / c-hrx)
        run: bash scripts/bench_libhrx_parity.sh

      - name: AddressSanitizer (GPU-free suites, real IREE)
        # Builds libhrx_rs.so with -Zsanitizer=address (+ -Zbuild-std) on the
        # pinned nightly and runs the GPU-free suites under ASAN; clang compiles
        # the C test programs to match rustc's LLVM ASAN runtime. ASAN intercepts
        # malloc/free process-wide, so heap UAF/double-free are caught across the
        # FFI boundary into the (uninstrumented) statically-linked IREE.
        run: |
          rustup toolchain install nightly-2026-04-03 --profile minimal --component rust-src
          bash scripts/sanitizer_diff.sh address

      # TSAN is intentionally NOT a lane: IREE is statically linked + uninstrumented,
      # so TSAN reports irreducible false races inside IREE's own threading. See
      # scripts/sanitizer_diff.sh (thread mode, investigation-only) and
      # scripts/tsan_suppressions.txt. Rust UB is covered by the `miri` job in
      # checks.yml — rustc has no UBSAN.
      # TODO(phase 4): libhrx CTS (--hrx-library libhrx_rs.so); fuzz lane.
